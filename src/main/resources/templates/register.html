<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="page auth-page">
    <section class="auth-card auth-card--wide">
        <h1 class="auth-title">Create your account</h1>
        <p class="auth-subtitle">Join to start booking K-pop cruises.</p>

        <form th:action="@{/register}" th:object="${customer}" method="post" class="auth-form auth-form--grid">

            <div class="form-group">
                <label for="firstName">First name</label>
                <input class="auth-input" type="text" id="firstName" th:field="*{firstName}" placeholder="First name">
                <small class="form-error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></small>
            </div>

            <div class="form-group">
                <label for="lastName">Last name</label>
                <input class="auth-input" type="text" id="lastName" th:field="*{lastName}" placeholder="Last name">
                <small class="form-error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></small>
            </div>

            <div class="form-group">
                <label for="birthDate">Birth Date</label>
                <input type="date"
                       id="birthDate"
                       class="auth-input"
                       th:field="*{birthDate}"
                       required>
                <small class="form-error"
                       th:if="${#fields.hasErrors('birthDate')}"
                       th:errors="*{birthDate}"></small>
            </div>

            <div class="form-group form-group--full">
                <label for="email">Email</label>
                <input class="auth-input" type="email" id="email" th:field="*{email}" placeholder="Enter your email">
                <small class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
            </div>

            <div class="form-group form-group--full">
                <label for="password">Password</label>
                <input class="auth-input" type="password" id="password" th:field="*{password}" placeholder="Create a password">
                <small class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </div>

            <div class="form-group form-group--full">
                <label for="address">Address</label>
                <input class="auth-input" type="text" id="address" th:field="*{address}" placeholder="Street address">
                <small class="form-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></small>
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input class="auth-input" type="text" id="city" th:field="*{city}" placeholder="City">
                <small class="form-error" th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></small>
            </div>

            <div class="form-group">
                <label for="postalCode">Postal code</label>
                <input class="auth-input" type="text" id="postalCode" th:field="*{postalCode}" placeholder="Postal code">
                <small class="form-error" th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></small>
            </div>

            <div class="form-group form-group--full">
                <button type="submit" class="btn auth-btn">Register with us</button>
            </div>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a th:href="@{/login}">Log in here</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Log in</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="page auth-page">
    <section class="auth-card auth-card--narrow">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to continue your K-pop cruise booking.</p>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input class="auth-input" type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="auth-input" type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <p class="form-error" th:if="${loginError}" th:text="${loginError}"></p>

            <button type="submit" class="btn auth-btn">Log in</button>
        </form>

        <p class="auth-switch">
            Don’t have an account?
            <a th:href="@{/register}">Create one here</a>
        </p>
    </section>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

</body>
</html>

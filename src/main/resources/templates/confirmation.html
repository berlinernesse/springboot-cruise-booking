<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation | K-Cruise</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="auth-page">
    <section class="auth-card auth-card--wide">
        <h1 class="auth-title">Booking Confirmed</h1>
        <p class="auth-subtitle">Your cruise reservation has been successfully confirmed.</p>

        <div class="form-group">
            <label>Booking Reference Number</label>
            <input type="text" class="auth-input" th:value="${booking.bookingReference}" readonly>
        </div>

        <br>

        <div class="auth-form auth-form--grid">
            <div class="form-group">
                <label>Cruise Name</label>
                <input type="text" class="auth-input" th:value="${booking.cruise.cruiseName}" readonly>
            </div>

            <div class="form-group">
                <label>Status</label>
                <input type="text" class="auth-input" th:value="${booking.status}" readonly>
            </div>

            <div class="form-group">
                <label>Departure Date</label>
                <input type="text" class="auth-input" th:value="${booking.departureDate}" readonly>
            </div>

            <div class="form-group">
                <label>Cabin Type</label>
                <input type="text" class="auth-input" th:value="${booking.cabinType}" readonly>
            </div>

            <div class="form-group">
                <label>Passengers</label>
                <input type="text" class="auth-input" th:value="${booking.noOfPassengers}" readonly>
            </div>

            <div class="form-group">
                <label>Total Price</label>
                <input type="text" class="auth-input" th:value="'$' + ${booking.totalPrice}" readonly>
            </div>

            <div class="form-group">
                <label>Origin</label>
                <input type="text" class="auth-input" th:value="${booking.cruise.origin}" readonly>
            </div>

            <div class="form-group">
                <label>Destination</label>
                <input type="text" class="auth-input" th:value="${booking.cruise.destination}" readonly>
            </div>
        </div>

        <div style="margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap;">
            <a th:href="@{/reservation}" class="btn">View My Reservations</a>
            <a th:href="@{/cruises}" class="btn">Book Another Cruise</a>
        </div>
    </section>
</main>

<footer class="footer">
    <p>© 2026 K-Cruise. All rights reserved.</p>
</footer>

</body>
</html>
